<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>創作芸人まとめ - Profile Page</title>
    <link rel="stylesheet" href="../assets/styles/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <header>
    <h1>創作芸人まとめ</h1>
    <div class="menu-btn" id="menu-btn">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <nav id="nav-menu">
      <ul>
        <li><a href="../index.html#home" class="nav-link">HOME</a></li>
        <li><a href="../index.html#about" class="nav-link">ABOUT</a></li>
        <li><a href="../index.html#link" class="nav-link">LINK</a></li>
      </ul>
    </nav>
  </header>
  <body class="profile-body">
    <div class="profile-container">
      <div class="profile-arrow prev" id="btn-prev">&#10094;</div>

      <div class="profile-content" id="profile-content">
        <div class="profile-left">
          <div
            class="profile-theme-bg"
            id="theme-bg"
            style="--theme-color: #a8c0d5"
          ></div>
          <img
            src="https://picsum.photos/400/500?random=10"
            alt="Person Image"
            class="profile-img"
            id="profile-img"
          />
        </div>

        <div class="profile-right">
          <div class="profile-role" id="profile-role">Lead UI/UX Designer</div>
          <h1 class="profile-name" id="profile-name">Sarah Jenkins</h1>

          <div class="profile-details">
            <div class="profile-col-left">
              <div class="profile-card">
                <h3>Memo</h3>
                <p id="profile-intro">
                  シンプルで直感的なUIデザインを得意としています。ユーザーの心理を第一に考え、触れていて心地よいインターフェースの追求を日々の目標にしています。休日は美術館巡りをしてインスピレーションを得ています。
                </p>
              </div>

              <div class="profile-card profile-chart-card">
                <h3>Status</h3>
                <div class="chart-container">
                  <canvas
                    id="profile-radar-chart"
                    aria-label="能力レーダーチャート"
                  ></canvas>
                </div>
              </div>
            </div>

            <div class="profile-col-right">
              <div class="profile-card profile-qa">
                <h3>Profile</h3>
                <dl id="profile-qa-list"></dl>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="profile-arrow next" id="btn-next">&#10095;</div>
    </div>
    <script src="../assets/scripts/script.js"></script>
  </body>
</html>
