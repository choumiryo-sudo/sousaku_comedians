<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neumorphism - Profile Page</title>
    <link rel="stylesheet" href="../assets/styles/style.css" />
  </head>
  <body class="profile-body">
    <div class="profile-container">
      <div class="profile-arrow prev" id="btn-prev">&#10094;</div>

      <div class="profile-content" id="profile-content">
        <div class="profile-left">
          <div
            class="profile-theme-bg"
            id="theme-bg"
            style="--theme-color: #a8c0d5"
          ></div>
          <img
            src="https://picsum.photos/400/500?random=10"
            alt="Person Image"
            class="profile-img"
            id="profile-img"
          />
        </div>

        <div class="profile-right">
          <div class="profile-role" id="profile-role">Lead UI/UX Designer</div>
          <h1 class="profile-name" id="profile-name">Sarah Jenkins</h1>

          <div class="profile-details">
            <div class="profile-card">
              <h3>自己紹介</h3>
              <p id="profile-intro">
                シンプルで直感的なUIデザインを得意としています。ユーザーの心理を第一に考え、触れていて心地よいインターフェースの追求を日々の目標にしています。休日は美術館巡りをしてインスピレーションを得ています。
              </p>
            </div>

            <div class="profile-card profile-qa">
              <h3>一問一答</h3>
              <dl id="profile-qa-list">
                <dt>趣味やマイブームは？</dt>
                <dd>カフェでのスケッチです。</dd>
                <dt>仕事で大切にしていること</dt>
                <dd>チーム内の密なコミュニケーション。</dd>
                <dt>好きな言葉</dt>
                <dd>神は細部に宿る</dd>
              </dl>
            </div>
          </div>
        </div>
      </div>

      <div class="profile-arrow next" id="btn-next">&#10095;</div>
    </div>
    <script src="../assets/scripts/script.js"></script>
  </body>
</html>
