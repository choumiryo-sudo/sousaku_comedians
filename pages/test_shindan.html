<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>性格診断 - Neumorphism</title>
    <link rel="stylesheet" href="../assets/styles/style.css" />
  </head>
  <body class="shindan">
    <div class="shindan-card">
      <div id="quiz-area">
        <div class="step-indicator" id="step-indicator">Question 1 / 5</div>
        <h2 class="question-text" id="question"></h2>
        <button class="choice-btn" id="btnA" onclick="answer('A')"></button>
        <button class="choice-btn" id="btnB" onclick="answer('B')"></button>
      </div>

      <div id="result-area">
        <div class="step-indicator">診断結果</div>
        <h2 class="question-text" id="result-title"></h2>
        <img src="" alt="Result Type" class="result-img" id="result-img" />
        <p class="result-desc" id="result-desc"></p>
        <a href="#" class="link-btn" id="result-link"
          ></a
        >
      </div>
    </div>

    <script src="../assets/scripts/script.js"></script>
    </script>
  </body>
</html>
